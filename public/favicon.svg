<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded dark background with a gold border -->
  <rect width="100" height="100" rx="24" fill="#09090b" stroke="url(#goldGrad)" stroke-width="2.5" />
  
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Indigo Gradient -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  
  <!-- Interconnected geometric blocks representing the 'Entities' (Kayanat) -->
  <g transform="translate(50, 50)">
    <!-- Indigo base structural blocks -->
    <path d="M-22,-22 L-6,-22 L-6,-6 L-22,-6 Z" fill="url(#indigoGrad)" />
    <path d="M6,6 L22,6 L22,22 L6,22 Z" fill="url(#indigoGrad)" />
    
    <!-- Diagonal golden link beam -->
    <path d="M-14,-14 L14,14" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Golden highlight structural blocks -->
    <path d="M6,-22 L22,-22 L22,-6 L6,-6 Z" fill="url(#goldGrad)" />
    <path d="M-22,6 L-6,6 L-6,22 L-22,22 Z" fill="url(#goldGrad)" />
  </g>
</svg>